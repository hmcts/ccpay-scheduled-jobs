plugins {
    id 'java'
    id 'java-library'
    id 'jacoco'
    id 'org.owasp.dependencycheck' version '12.1.3'
    id 'org.sonarqube' version '6.3.1.5724'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'uk.gov.hmcts.reform.payment'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

repositories {
    mavenLocal()
    mavenCentral()
    maven { url = 'https://pkgs.dev.azure.com/hmcts/Artifacts/_packaging/hmcts-lib/maven/v1' }
}


configurations.configureEach {
    resolutionStrategy {
        eachDependency { DependencyResolveDetails det ->
            /* JAR upgrades with latest versions for CVE fixes*/

            /* CVE-2025-48976 */
            if (det.requested.name == 'commons-fileupload') {
                det.useVersion '1.6.0'
            }

            /*
                CVE-2025-48924
            */
            if (det.requested.group == 'org.apache.commons' && det.requested.name == 'commons-lang3') {
                det.useVersion '3.18.0'
            }
            /* CVEs: CVE-2026-41842, CVE-2026-41850, CVE-2026-41851, CVE-2026-41840, CVE-2026-41841, CVE-2026-41843
            Force Spring framework modules to 6.2.19 */
            if (det.requested.group == 'org.springframework' && det.requested.name in ['spring-beans', 'spring-context', 'spring-core', 'spring-expression', 'spring-jcl','spring-aop']) {
                det.useVersion '6.2.19'
            }

            /*
                CVE-2026-40988, CVE-2026-41003, CVE-2026-41694
                Force Spring Security modules to a patched 6.5.11
            */
            def springSecurityModules = [
                    'spring-security-core',
                    'spring-security-web',
                    'spring-security-config',
                    'spring-security-crypto'
            ]
            if (det.requested.group == 'org.springframework.security' && springSecurityModules.contains(det.requested.name)) {
                det.useVersion '6.5.11'
            }

            /*
            * CVE-2026-41842
            * */
            if ((det.requested.group == 'com.fasterxml.jackson.core' || det.requested.group == 'tools.jackson.core') && det.requested.name in ['jackson-databind', 'jackson-core']) {
                // force to use tools.jackson.core artifacts at 3.2.0
                det.useTarget "tools.jackson.core:${det.requested.name}:3.2.0"
            }
        }
    }
}

dependencies {
    implementation 'io.rest-assured:rest-assured:5.5.7'
    implementation 'com.github.hmcts:service-auth-provider-java-client:5.3.4'
    implementation 'org.bouncycastle:bcprov-jdk18on:1.84'
    implementation 'com.github.hmcts.java-logging:logging:8.0.0'
    implementation 'org.springframework.boot:spring-boot-starter-actuator:3.5.15'
    implementation 'org.springframework.cloud:spring-cloud-starter-openfeign:4.3.3'
    implementation 'io.github.openfeign:feign-jackson:13.13'
    implementation 'tools.jackson.core:jackson-core:3.2.0'
    implementation 'org.json:json:20250517'
    implementation 'org.apache.logging.log4j:log4j-to-slf4j:2.26.0'

    testImplementation 'org.springframework.boot:spring-boot-starter-test:3.5.15'
    testImplementation 'org.wiremock:wiremock:3.13.2'
    testImplementation 'com.github.hmcts:fortify-client:1.4.10:all'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

dependencyManagement {
    imports {
        /* address CVE-2025-41234, CVE-2026-22735 and CVE-2026-22737 */
        mavenBom "org.springframework:spring-framework-bom:6.2.19"
        /* CVE-2026-22748, CVE-2026-22746 */
        mavenBom "org.springframework.security:spring-security-bom:7.0.5"
    }
}

tasks.register('fortifyScan', JavaExec) {
    mainClass = "uk.gov.hmcts.fortifyclient.FortifyClientMainApp"
    classpath += sourceSets.test.runtimeClasspath
    jvmArgs = ['--add-opens=java.base/java.lang.reflect=ALL-UNNAMED']
}

jacocoTestReport {
  executionData(test)
  reports {
    xml.required = true
    csv.required = false
    xml.outputLocation = layout.buildDirectory.file('reports/jacoco/test/jacocoTestReport.xml')
  }
}

tasks.named('sonarqube') {
    dependsOn tasks.named('jacocoTestReport')
}

test {
    useJUnitPlatform()
}

sonarqube {
  properties {
    property "sonar.projectName", "Reform :: payment-jobs"
    property "sonar.projectKey", "uk.gov.hmcts.reform:payment-jobs"
    property "sonar.coverage.exclusions", "**/JobProcessorConfiguration*,**JobProcessorApplication*,**/JobProcessorRunner*,**/RefundNotificationUpdateProcessor*,**/StatusUpdateProcessor*,**/UnprocessedPaymentUpdateProcessor*"
    property "sonar.coverage.jacoco.xmlReportPaths", "${jacocoTestReport.reports.xml.outputLocation}"
  }
}


dependencyCheck {
  // Specifies if the build should be failed if a CVSS score above a specified level is identified.
  // range of 0-10 fails the build, anything greater and it doesn't fail the build
  failBuildOnCVSS = System.getProperty('dependencyCheck.failBuild') == 'true' ? 0 : 11
  suppressionFile = 'config/owasp/suppressions.xml'
  formats = ['HTML', 'XML', 'JSON']

  analyzers {
    // Disable scanning of .NET related binaries
    assemblyEnabled = false
  }
}

jar {
    manifest {
        attributes  'Main-Class': 'JobProcessorApplication', 'Implementation-Title': project.name, 'Implementation-Version': project.version
    }

    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    } {
        exclude "META-INF/*.SF"
        exclude "META-INF/*.DSA"
        exclude "META-INF/*.RSA"
    }

    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

tasks.withType(Copy).configureEach {
    filesMatching("**/*.yaml") {
        duplicatesStrategy = DuplicatesStrategy.INCLUDE
    }
}

tasks.register('copyToLib', Copy) {
    into layout.buildDirectory.dir('output/lib')
    from configurations.compileClasspath
}
